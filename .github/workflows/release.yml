name: Release — Cross-Platform Encrypted Build

on:
  pull_request:
    types: [closed]
    branches: [main, ai-team]

permissions:
  contents: write

jobs:
  check-release:
    name: Check Release Trigger
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      bump_type: ${{ steps.check.outputs.bump_type }}
      new_version: ${{ steps.version.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title for release trigger
        id: check
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR title: $TITLE"

          if echo "$TITLE" | grep -qi '\[MAJOR\]'; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=major" >> $GITHUB_OUTPUT
          elif echo "$TITLE" | grep -qi '\[MINOR\]'; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          elif echo "$TITLE" | grep -qi '\[PATCH\]'; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "bump_type=patch" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "bump_type=none" >> $GITHUB_OUTPUT
            echo "No release tag found in PR title. Skipping release."
          fi

      - name: Calculate next version
        id: version
        if: steps.check.outputs.should_release == 'true'
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          echo "Latest tag: $LATEST"

          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          BUMP="${{ steps.check.outputs.bump_type }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION (bump: $BUMP)"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

  build:
    needs: check-release
    if: needs.check-release.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: amenthyx-windows.exe
            pyinstaller_name: amenthyx.exe
          - os: ubuntu-latest
            artifact: amenthyx-linux
            pyinstaller_name: amenthyx
          - os: macos-latest
            artifact: amenthyx-macos
            pyinstaller_name: amenthyx

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Build PyInstaller bootloader from source to avoid AV false positives.
      # Pre-built bootloaders are flagged by heuristic scanners because their
      # hash is widely known. Compiling from source produces a unique binary.
      - name: Install PyInstaller (bootloader from source)
        shell: bash
        run: |
          pip install pyinstaller --no-binary pyinstaller

      # Inject version metadata into the executable (helps AV trust scoring)
      - name: Create version info
        shell: python
        run: |
          import json, os

          version = "${{ needs.check-release.outputs.new_version }}".lstrip("v")
          parts = version.split(".")
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])

          # Windows version info (VERSIONINFO resource)
          version_info = f'''
          VSVersionInfo(
            ffi=FixedFileInfo(
              filevers=({major}, {minor}, {patch}, 0),
              prodvers=({major}, {minor}, {patch}, 0),
              mask=0x3f,
              flags=0x0,
              OS=0x40004,
              fileType=0x1,
              subtype=0x0,
              date=(0, 0)
            ),
            kids=[
              StringFileInfo([
                StringTable(
                  u'040904B0',
                  [
                    StringStruct(u'CompanyName', u'Amenthyx'),
                    StringStruct(u'FileDescription', u'Amenthyx AI Teams CLI'),
                    StringStruct(u'FileVersion', u'{version}'),
                    StringStruct(u'InternalName', u'amenthyx'),
                    StringStruct(u'LegalCopyright', u'Copyright (c) 2024-2026 Amenthyx'),
                    StringStruct(u'OriginalFilename', u'amenthyx.exe'),
                    StringStruct(u'ProductName', u'Amenthyx AI Teams'),
                    StringStruct(u'ProductVersion', u'{version}'),
                  ]
                )
              ]),
              VarFileInfo([VarStruct(u'Translation', [1033, 1200])])
            ]
          )
          '''

          with open("version_info.txt", "w") as f:
              f.write(version_info)
          print(f"Version info created: {version}")

      - name: Encrypt content into vault
        run: python shared/bundler.py --output shared/_vault.py

      - name: Verify vault roundtrip
        run: python shared/bundler.py --verify

      - name: Build encrypted executable
        shell: python
        run: |
          import os, sys

          sep = ";" if sys.platform == "win32" else ":"
          vault = os.path.join("shared", "_vault.py")
          bundler = os.path.join("shared", "bundler.py")

          args = [
              os.path.join("shared", "amenthyx_cli.py"),
              "--onefile",
              "--name=amenthyx",
              "--console",
              "--noconfirm",
              "--noupx",          # Disable UPX compression (triggers AV heuristics)
              "--strip",          # Strip debug symbols (reduces size, cleaner binary)
          ]

          # Add Windows version info resource
          if sys.platform == "win32" and os.path.isfile("version_info.txt"):
              args.append("--version-file=version_info.txt")

          if os.path.isfile(vault):
              args.append(f"--add-data={vault}{sep}shared")
          if os.path.isfile(bundler):
              args.append(f"--add-data={bundler}{sep}shared")

          import PyInstaller.__main__
          PyInstaller.__main__.run(args)

      - name: Verify no source code leaked
        shell: bash
        run: |
          LEAKED=$(find dist/ -name "*.md" -o -name "*.py" 2>/dev/null | head -20)
          if [ -n "$LEAKED" ]; then
            echo "ERROR: Source files found in dist/:"
            echo "$LEAKED"
            exit 1
          fi
          echo "CLEAN — zero .md or .py in distribution"

      # Windows: sign with certificate if available
      - name: Sign Windows executable
        if: matrix.os == 'windows-latest' && env.WINDOWS_SIGN_CERT != ''
        shell: pwsh
        env:
          WINDOWS_SIGN_CERT: ${{ secrets.WINDOWS_SIGN_CERT }}
          WINDOWS_SIGN_PASSWORD: ${{ secrets.WINDOWS_SIGN_PASSWORD }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_SIGN_CERT)
          [IO.File]::WriteAllBytes("cert.pfx", $certBytes)
          & signtool sign /f cert.pfx /p $env:WINDOWS_SIGN_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 "dist\${{ matrix.pyinstaller_name }}"
          Remove-Item cert.pfx -Force
          Write-Host "Windows binary signed successfully"

      # macOS: sign and notarize if credentials available
      - name: Sign and notarize macOS binary
        if: matrix.os == 'macos-latest' && env.APPLE_DEVELOPER_ID != ''
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          codesign --force --deep --sign "$APPLE_DEVELOPER_ID" "dist/${{ matrix.pyinstaller_name }}"
          echo "macOS binary signed"

          # Notarize (submit to Apple for scanning)
          ditto -c -k --keepParent "dist/${{ matrix.pyinstaller_name }}" "dist/amenthyx.zip"
          xcrun notarytool submit "dist/amenthyx.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || echo "Notarization submitted (may take time)"

      - name: Rename artifact
        shell: bash
        run: |
          if [ -f "dist/${{ matrix.pyinstaller_name }}" ]; then
            cp "dist/${{ matrix.pyinstaller_name }}" "dist/${{ matrix.artifact }}"
            ls -lh "dist/${{ matrix.artifact }}"
          else
            echo "ERROR: dist/${{ matrix.pyinstaller_name }} not found"
            ls -la dist/
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}
          retention-days: 30

  release:
    needs: [check-release, build]
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push version tag
        run: |
          VERSION="${{ needs.check-release.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Make Linux and macOS binaries executable
        run: |
          chmod +x release-artifacts/amenthyx-linux/amenthyx-linux || true
          chmod +x release-artifacts/amenthyx-macos/amenthyx-macos || true

      - name: Generate checksums
        run: |
          cd release-artifacts
          find . -type f -name "amenthyx-*" -exec sha256sum {} \; > ../checksums.txt
          cat ../checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.new_version }}
          name: Amenthyx AI Teams ${{ needs.check-release.outputs.new_version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Amenthyx AI Teams ${{ needs.check-release.outputs.new_version }}

            Cross-platform encrypted binaries — all team protocols and source code
            are encrypted inside the binary. Zero readable .md or .py files.

            **Security**: Binaries are built from a compiled-from-source PyInstaller
            bootloader, include version metadata, and are signed when certificates
            are configured. SHA-256 checksums are provided below.

            ### Download
            | Platform | File |
            |----------|------|
            | Windows | `amenthyx-windows.exe` |
            | Linux | `amenthyx-linux` |
            | macOS | `amenthyx-macos` |

            ### Verify Integrity
            ```bash
            sha256sum -c checksums.txt
            ```

            ### Usage
            ```bash
            amenthyx list                                       # List all 65 teams
            amenthyx info fullStack                             # Team details
            amenthyx activate --team fullStack --strategy s.md  # Activate a team
            amenthyx health                                     # Project health check
            ```
          files: |
            release-artifacts/amenthyx-windows.exe/amenthyx-windows.exe
            release-artifacts/amenthyx-linux/amenthyx-linux
            release-artifacts/amenthyx-macos/amenthyx-macos
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
